<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tienda de Teléfonos</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Estilos personalizados -->
    <style>
        body {
            background-color: #f5f7fa;
        }

        .navbar {
            background-color: #0d6efd;
        }

        .navbar-brand {
            color: white !important;
            font-weight: bold;
        }

        .card {
            border: none;
            border-radius: 15px;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: scale(1.03);
        }

        .card img {
            height: 250px;
            object-fit: cover;
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
        }

        .precio {
            font-size: 20px;
            font-weight: bold;
            color: #198754;
        }

        .btn-comprar {
            border-radius: 20px;
        }
    </style>
</head>

<body>

<!-- 🔝 NAVBAR -->
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <span class="navbar-brand">📱 TecniCell</span>
    </div>
</nav>

<!-- CONTENIDO -->
<div class="container mt-5">

    <h2 class="text-center mb-5">Nuestros Teléfonos</h2>

    <div class="row">

        {% for telefono in telefonos %}

        <div class="col-md-4 mb-4">

            <div class="card shadow">

                <img src="{{ url_for('static', filename=telefono.imagen) }}">

                <div class="card-body text-center">

                    <h5 class="card-title">{{ telefono.nombre }}</h5>

                    <p class="precio">
                        ${{ "{:,.0f}".format(telefono.precio) }}
                    </p>

                    <button class="btn btn-success btn-comprar">
                        🛒 Comprar
                    </button>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

</div>

</body>
</html>
